name: Bug Report
description: Report a bug in shorol.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please include as much detail as you can.
  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npm view shorol version` or the version you're using.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: "Describe the expected result."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
      placeholder: "Describe what happened instead."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Provide a minimal example showing the issue.
      render: shell
      placeholder: |
        import { regex } from "shorol";
        // ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, and package manager.
      placeholder: "macOS 14, Node 20.12.2, npm 10.5.0"
    validations:
      required: true
