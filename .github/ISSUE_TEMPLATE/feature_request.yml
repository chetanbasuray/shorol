name: Feature Request
description: Suggest an idea for shorol.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Tell us what you'd like to see.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point or limitation are you running into?
      placeholder: "Describe the issue or missing capability."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should this work?
      placeholder: "Describe the desired API or behavior."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered.
      placeholder: "Any workarounds or alternatives?"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, examples, or extra details.
      placeholder: "Add any context here."
    validations:
      required: false
