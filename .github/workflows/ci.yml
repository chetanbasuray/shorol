name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run commitlint

  release:
    needs: [test]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm run build
      - name: Debug OIDC claims
        run: |
          node <<'NODE'
          const https = require("node:https");
          const url = process.env.ACTIONS_ID_TOKEN_REQUEST_URL;
          const token = process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;
          if (!url || !token) {
            console.log("OIDC not available");
            process.exit(0);
          }
          const requestUrl = url.includes("audience=") ? url : `${url}&audience=npm`;
          const req = https.get(
            requestUrl,
            { headers: { Authorization: `Bearer ${token}` } },
            (res) => {
              let data = "";
              res.on("data", (chunk) => (data += chunk));
              res.on("end", () => {
                try {
                  const parsed = JSON.parse(data);
                  const value = parsed.value || "";
                  const parts = value.split(".");
                  if (parts.length < 2) {
                    console.log("OIDC token missing payload");
                    process.exit(0);
                  }
                  const payload = JSON.parse(
                    Buffer.from(parts[1], "base64url").toString("utf8")
                  );
                  const pick = {
                    sub: payload.sub,
                    repository: payload.repository,
                    repository_owner: payload.repository_owner,
                    job_workflow_ref: payload.job_workflow_ref,
                    ref: payload.ref,
                    sha: payload.sha,
                    workflow: payload.workflow,
                    actor: payload.actor,
                    event_name: payload.event_name
                  };
                  console.log(JSON.stringify(pick, null, 2));
                } catch (err) {
                  console.log("Failed to parse OIDC claims");
                  console.log(String(err));
                }
              });
            }
          );
          req.on("error", (err) => {
            console.log("OIDC request failed");
            console.log(String(err));
          });
          NODE
      - run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0

  release_preview:
    needs: [test]
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish --dry-run --provenance --access public
      - run: npm install
      - run: npm run build
      - run: npx semantic-release --dry-run --no-ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
