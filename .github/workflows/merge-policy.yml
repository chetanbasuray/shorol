name: Merge Policy

on:
  pull_request:
    branches: ["main"]

jobs:
  enforce:
    name: Merge Policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate head branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "PR from: $HEAD_REF"
          if [[ "$HEAD_REF" != release/* && "$HEAD_REF" != hotfix/* ]]; then
            echo "ERROR: PRs to main must come from release/* or hotfix/* branches."
            exit 1
          fi
