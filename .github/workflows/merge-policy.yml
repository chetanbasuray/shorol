name: Merge Policy

on:
  pull_request:
    branches: ["main"]

jobs:
  enforce:
    name: Merge Policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate head branch
        run: |
          echo "PR from: ${{ github.head_ref }}"
          if [[ "${{ github.head_ref }}" != release/* && "${{ github.head_ref }}" != hotfix/* ]]; then
            echo "ERROR: PRs to main must come from release/* or hotfix/* branches."
            exit 1
          fi
