name: Merge Policy

on:
  pull_request:
    branches: ["main"]

jobs:
  enforce:
    name: Merge Policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate head branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "PR from: $HEAD_REF"
          if [[ "$HEAD_REF" != release/* && "$HEAD_REF" != hotfix/* && "$HEAD_REF" != dependabot/* && "$HEAD_REF" != fix/* && "$HEAD_REF" != bugfix/* && "$HEAD_REF" != chore/* && "$HEAD_REF" != feat/* ]]; then
            echo "ERROR: PRs to main must come from release/*, hotfix/*, dependabot/*, fix/*, bugfix/*, chore/*, or feat/* branches."
            exit 1
          fi
